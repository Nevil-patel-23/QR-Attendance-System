# ============================================================
# QR Attendance System \u2014 application.properties
# ============================================================
# All secrets come from .env via system properties.
# QrAttendanceApplication.java loads .env at startup using
# dotenv-java, so every ${...} below resolves automatically.
# ============================================================

# \u2500\u2500 Application \u2500\u2500
spring.application.name=qr-attendance

# \u2500\u2500 PostgreSQL datasource \u2500\u2500
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# \u2500\u2500 JPA / Hibernate \u2500\u2500
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# \u2500\u2500 Flyway \u2014 database migrations \u2500\u2500
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# \u2500\u2500 JWT \u2500\u2500
jwt.secret=${JWT_SECRET}
jwt.expiry.ms=${JWT_EXPIRY_MS}

# \u2500\u2500 QR code \u2500\u2500
qr.expiry.seconds=${QR_EXPIRY_SECONDS}

# \u2500\u2500 Attendance threshold \u2500\u2500
app.minimum.attendance.percent=${MINIMUM_ATTENDANCE_PERCENT:75}

# \u2500\u2500 Vaadin \u2500\u2500
vaadin.launch-browser=false
vaadin.devmode.enabled=false


# \u2500\u2500 Server \u2500\u2500
server.port=8080
